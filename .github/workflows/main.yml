name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Build
      working-directory: ShiningMask
      run: |
        xcodebuild \
          -project ShiningMask.xcodeproj \
          -scheme ShiningMask \
          -configuration Release \
          -sdk iphoneos \
          -destination generic/platform=iOS \
          CODE_SIGNING_ALLOWED=NO \
          ONLY_ACTIVE_ARCH=NO \
          clean build \
          -derivedDataPath $GITHUB_WORKSPACE/build

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/ShiningMask.app Payload/
        zip -r ShiningMask.ipa Payload

    - uses: actions/upload-artifact@v4
      with:
        name: ShiningMask-IPA
        path: ShiningMask.ipa
        retention-days: 30
